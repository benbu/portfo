<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" fill="none">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e3a5f"/>
    </linearGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#bfdbfe"/>
      <stop offset="100%" stop-color="#93c5fd"/>
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect width="800" height="450" fill="url(#sky)"/>

  <!-- Stars -->
  <circle cx="120" cy="40" r="1.2" fill="white" opacity="0.6"/>
  <circle cx="240" cy="25" r="1" fill="white" opacity="0.5"/>
  <circle cx="380" cy="55" r="1.5" fill="white" opacity="0.7"/>
  <circle cx="530" cy="30" r="1" fill="white" opacity="0.5"/>
  <circle cx="660" cy="48" r="1.2" fill="white" opacity="0.6"/>
  <circle cx="720" cy="20" r="1" fill="white" opacity="0.4"/>
  <circle cx="60" cy="70" r="1" fill="white" opacity="0.4"/>

  <!-- Ground (ice shelf) -->
  <rect x="0" y="370" width="800" height="80" fill="url(#ground)" rx="0"/>
  <rect x="0" y="368" width="800" height="8" fill="#e0f2fe" opacity="0.8"/>

  <!-- Icicles falling -->
  <!-- Icicle 1 -->
  <polygon points="160,80 148,160 172,160" fill="#bae6fd" opacity="0.85"/>
  <polygon points="160,160 154,155 166,155" fill="#e0f2fe" opacity="0.5"/>
  <!-- Icicle 2 -->
  <polygon points="320,30 308,130 332,130" fill="#7dd3fc" opacity="0.8"/>
  <polygon points="320,130 314,124 326,124" fill="#e0f2fe" opacity="0.5"/>
  <!-- Icicle 3 -->
  <polygon points="500,60 490,180 510,180" fill="#bae6fd" opacity="0.9"/>
  <polygon points="500,180 494,174 506,174" fill="#e0f2fe" opacity="0.5"/>
  <!-- Icicle 4 (shattered on ground) -->
  <polygon points="640,290 635,340 648,338" fill="#7dd3fc" opacity="0.6"/>
  <polygon points="640,290 630,335 638,332" fill="#bae6fd" opacity="0.5"/>
  <!-- Shatter shards -->
  <polygon points="618,368 626,356 634,370" fill="#e0f2fe" opacity="0.7"/>
  <polygon points="648,362 658,350 666,364" fill="#bae6fd" opacity="0.6"/>
  <polygon points="635,355 628,345 642,348" fill="#7dd3fc" opacity="0.5"/>

  <!-- Gem bouncing free -->
  <polygon points="672,320 680,308 688,320 680,332" fill="#a855f7" opacity="0.9"/>
  <polygon points="672,320 680,308 688,320" fill="#d8b4fe" opacity="0.6"/>

  <!-- Penguin body -->
  <!-- Body (low-poly) -->
  <polygon points="390,280 370,340 410,340" fill="#1e293b"/>
  <polygon points="390,280 410,340 425,305" fill="#334155"/>
  <!-- Belly -->
  <polygon points="390,295 376,335 404,335" fill="#f1f5f9"/>
  <!-- Head -->
  <polygon points="390,250 372,280 408,280" fill="#1e293b"/>
  <polygon points="390,250 408,280 415,265" fill="#334155"/>
  <!-- Eyes -->
  <circle cx="382" cy="266" r="4" fill="white"/>
  <circle cx="382" cy="266" r="2" fill="#0f172a"/>
  <circle cx="398" cy="264" r="4" fill="white"/>
  <circle cx="398" cy="264" r="2" fill="#0f172a"/>
  <!-- Beak -->
  <polygon points="390,272 384,278 396,278" fill="#f59e0b"/>
  <!-- Flippers -->
  <polygon points="370,300 350,330 372,328" fill="#1e293b"/>
  <polygon points="410,300 428,328 408,326" fill="#334155"/>
  <!-- Feet -->
  <polygon points="376,340 366,355 386,352" fill="#f59e0b"/>
  <polygon points="404,340 394,352 414,355" fill="#f59e0b"/>
  <!-- Hat (top hat) -->
  <rect x="376" y="232" width="28" height="4" rx="2" fill="#7c3aed"/>
  <rect x="381" y="210" width="18" height="22" rx="2" fill="#7c3aed"/>

  <!-- Score UI -->
  <rect x="20" y="20" width="140" height="36" rx="6" fill="#0f172a" opacity="0.7"/>
  <text x="32" y="33" font-family="monospace" font-size="10" fill="#94a3b8">SCORE</text>
  <text x="32" y="48" font-family="monospace" font-size="14" font-weight="bold" fill="#f8fafc">48,320</text>

  <!-- Best score -->
  <rect x="640" y="20" width="140" height="36" rx="6" fill="#0f172a" opacity="0.7"/>
  <text x="652" y="33" font-family="monospace" font-size="10" fill="#94a3b8">BEST</text>
  <text x="652" y="48" font-family="monospace" font-size="14" font-weight="bold" fill="#a855f7">112,500</text>

  <!-- Gem counter -->
  <rect x="340" y="20" width="120" height="36" rx="6" fill="#0f172a" opacity="0.7"/>
  <polygon points="360,38 367,28 374,38 367,48" fill="#a855f7"/>
  <text x="380" y="44" font-family="monospace" font-size="14" font-weight="bold" fill="#f8fafc">× 7</text>
</svg>
