<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" fill="none">
  <rect width="800" height="450" fill="#111827"/>

  <!-- Monitor -->
  <rect x="220" y="80" width="360" height="220" rx="12" fill="#1f2937" stroke="#374151" stroke-width="2"/>
  <rect x="236" y="96" width="328" height="188" rx="4" fill="#0f172a"/>
  <!-- Screen content: XML lines -->
  <rect x="252" y="116" width="140" height="8" rx="2" fill="#4f46e5" opacity="0.7"/>
  <rect x="252" y="132" width="200" height="6" rx="2" fill="#6366f1" opacity="0.5"/>
  <rect x="268" y="146" width="160" height="6" rx="2" fill="#818cf8" opacity="0.4"/>
  <rect x="268" y="160" width="120" height="6" rx="2" fill="#818cf8" opacity="0.4"/>
  <rect x="252" y="174" width="180" height="6" rx="2" fill="#6366f1" opacity="0.5"/>
  <rect x="252" y="192" width="100" height="6" rx="2" fill="#4f46e5" opacity="0.6"/>
  <!-- Monitor stand -->
  <rect x="383" y="300" width="34" height="30" rx="2" fill="#1f2937"/>
  <rect x="340" y="328" width="120" height="10" rx="5" fill="#374151"/>

  <!-- Phone -->
  <rect x="562" y="130" width="90" height="160" rx="14" fill="#1f2937" stroke="#374151" stroke-width="2"/>
  <rect x="572" y="148" width="70" height="120" rx="3" fill="#0f172a"/>
  <!-- Phone screen: list items -->
  <rect x="580" y="158" width="54" height="8" rx="2" fill="#4f46e5" opacity="0.8"/>
  <rect x="580" y="174" width="42" height="6" rx="2" fill="#818cf8" opacity="0.5"/>
  <rect x="580" y="188" width="50" height="6" rx="2" fill="#818cf8" opacity="0.5"/>
  <rect x="580" y="202" width="38" height="6" rx="2" fill="#818cf8" opacity="0.4"/>
  <rect x="580" y="216" width="46" height="6" rx="2" fill="#818cf8" opacity="0.4"/>
  <!-- Home button -->
  <circle cx="607" cy="276" r="6" fill="#374151"/>

  <!-- Connection arrows -->
  <path d="M552 195 L562 195" stroke="#4f46e5" stroke-width="2" stroke-dasharray="4 3" marker-end="url(#arr)"/>
  <path d="M562 210 L552 210" stroke="#6366f1" stroke-width="2" stroke-dasharray="4 3" marker-end="url(#arr2)"/>
  <defs>
    <marker id="arr" markerWidth="6" markerHeight="6" refX="6" refY="3" orient="auto">
      <path d="M0 0 L6 3 L0 6 Z" fill="#4f46e5"/>
    </marker>
    <marker id="arr2" markerWidth="6" markerHeight="6" refX="6" refY="3" orient="auto">
      <path d="M0 0 L6 3 L0 6 Z" fill="#6366f1"/>
    </marker>
  </defs>

  <!-- Label -->
  <text x="400" y="400" text-anchor="middle" font-family="monospace" font-size="18" fill="#6366f1" opacity="0.8">Remotocon</text>
  <text x="400" y="422" text-anchor="middle" font-family="monospace" font-size="12" fill="#4b5563">C# · .NET · Java · Android · XML-RPC</text>
</svg>
